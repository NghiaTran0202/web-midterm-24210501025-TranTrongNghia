<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký Sự kiện/Khóa học</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

    <nav class="navbar navbar-expand-lg navbar-dark bg-dark">
        <div class="container">
            <a class="navbar-brand" href="index.html">EventHub</a>
            <div class="collapse navbar-collapse">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item"><a class="nav-link" href="index.html">Trang chủ</a></li>
                    <li class="nav-item"><a class="nav-link" href="courses.html">Sự kiện/Khóa học</a></li>
                    <li class="nav-item"><a class="nav-link active" href="register.html">Đăng ký</a></li>
                    <li class="nav-item"><a class="nav-link" href="registrations.html">Danh sách đã đăng ký</a></li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow">
                    <div class="card-header bg-primary text-white">
                        <h4 class="mb-0">Form Đăng Ký Tham Gia</h4>
                    </div>
                    <div class="card-body">
                        <form id="registerForm">
                            <div class="mb-3">
                                <label class="form-label">Họ và tên *</label>
                                <input type="text" class="form-control" id="fullname">
                                <span class="text-danger small" id="nameErr"></span>
                            </div>
                            
                            <div class="row">
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Email *</label>
                                    <input type="text" class="form-control" id="email">
                                    <span class="text-danger small" id="emailErr"></span>
                                </div>
                                <div class="col-md-6 mb-3">
                                    <label class="form-label">Số điện thoại *</label>
                                    <input type="text" class="form-control" id="phone">
                                    <span class="text-danger small" id="phoneErr"></span>
                                </div>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Lớp *</label>
                                <input type="text" class="form-control" id="class" required>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Chọn Sự kiện/Khóa học *</label>
                                <select class="form-select" id="courseSelect" required>
                                    <option value="" disabled selected>-- Chọn khóa học --</option>
                                </select>
                            </div>

                            <div class="mb-3">
                                <label class="form-label">Ghi chú thêm</label>
                                <textarea class="form-control" id="note" rows="3"></textarea>
                            </div>

                            <button type="submit" class="btn btn-success w-100">Đăng Ký Ngay</button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="assets/js/data.js"></script>
    <script src="assets/js/main.js"></script>
</body>
</html>
